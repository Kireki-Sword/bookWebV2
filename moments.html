<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favourite Moments — Inkwell</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
</head>

<body data-page="moments">

  <nav class="navbar">
    <a href="index.html#home" class="nav-logo">
      <div class="nav-logo-icon"><i class="ti ti-book-2"></i></div>
      <span class="nav-logo-text">Inkwell</span>
    </a>

    <ul class="nav-links">
      <li><a href="index.html#home">Home</a></li>
      <li><a href="index.html#library">My Library</a></li>
      <li><a href="index.html#social">Social</a></li>
    </ul>

    <div class="nav-auth">
      <button class="btn-ghost" type="button">Log in</button>
      <button class="btn-primary" type="button">Sign up</button>
    </div>
  </nav>

  <main class="container page-main">
    <a class="back-link" href="index.html#library">
      <i class="ti ti-arrow-left"></i>
      Back to Library
    </a>

    <section class="journal-page">
      <div class="journal-header">
        <p class="section-eyebrow">Favourite moments</p>
        <h1 id="moments-title">Favourite Moments</h1>
        <p id="moments-meta"></p>
      </div>

      <div class="entry-form">
        <label class="form-label" for="moment-title">Moment title</label>
        <input
          id="moment-title"
          class="form-input"
          type="text"
          placeholder="Example: The big reveal"
        >

        <label class="form-label" for="moment-desc">Description</label>
        <textarea
          id="moment-desc"
          class="journal-small-textarea"
          placeholder="What happened? Why did this moment matter?"
        ></textarea>

        <label class="form-label" for="moment-image-url">Image URL</label>
        <input
          id="moment-image-url"
          class="form-input"
          type="url"
          placeholder="https://..."
        >

        <label class="form-label" for="moment-image-file">Or upload image from your device</label>
        <input
          id="moment-image-file"
          class="form-input"
          type="file"
          accept="image/*"
        >

        <button class="btn-primary full-btn" type="button" onclick="addMomentPage()">
          <i class="ti ti-plus"></i>
          Save Moment
        </button>
      </div>

      <div class="saved-list" id="moments-list"></div>

      <div class="page-actions">
        <button class="btn-ghost" type="button" onclick="goToDetailPage()">
          <i class="ti ti-info-circle"></i>
          Back to Details
        </button>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <div class="footer-logo">
          <div class="nav-logo-icon"><i class="ti ti-book-2"></i></div>
          <span>Inkwell</span>
        </div>
        <p>Your personal reading journal for manga, books, comics, and light novels.</p>
      </div>

      <div class="footer-links">
        <a href="index.html#home">Home</a>
        <a href="index.html#library">My Library</a>
        <a href="index.html#social">Social</a>
      </div>

      <p class="footer-copy">© 2026 Inkwell. Built for readers.</p>
    </div>
  </footer>

  <div id="toast" class="toast"></div>

  <script src="index.js"></script>
</body>
</html>
